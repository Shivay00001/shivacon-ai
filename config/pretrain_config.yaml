# OmniCore Ultra-Scale Pre-Training Configuration
# ------------------------------------------------------------------
# Defines the multi-modal parameters required to scale the LLM.

model:
  architecture: "OmniCore-7B-Base"
  hidden_size: 4096
  num_hidden_layers: 32
  num_attention_heads: 32
  intermediate_size: 11008
  max_position_embeddings: 32768  # 32K context window
  
  # Multimodal Core Integrations
  vision_encoder:
    type: "ViT-L/14"
    image_size: 336
    patch_size: 14
    projection_dim: 4096
    
  audio_encoder:
    type: "CNN-Mel-Spec"
    sample_rate: 16000
    n_mels: 128
    projection_dim: 4096

training:
  batch_size: 2048 # Global batch size across shards
  micro_batch_size: 4
  gradient_accumulation_steps: 8
  
  # Optimizer
  optimizer:
    type: "AdamW"
    learning_rate: 3.0e-4
    weight_decay: 0.1
    beta1: 0.9
    beta2: 0.95
    eps: 1.0e-8
    
  # Scheduler
  lr_scheduler:
    type: "cosine"
    warmup_steps: 2000
    max_steps: 1000000
    min_lr: 3.0e-5
    
  # Infrastructure
  fp16: true
  bf16: false
  gradient_clipping: 1.0
  deepspeed_stage: 3 # ZeRO-3 partitioning for multi-node

data:
  # Massive Sharded WebScale Pretraining
  train_paths:
    - "data/pretraining/omnicore_pretrain_train_*.jsonl"
  
  # Mixture ratios during continuous batching
  modal_mixture:
    text_only: 0.4
    image_text: 0.4
    agentic_reasoning_trace: 0.2
    
  max_seq_length: 4096
  num_workers: 16
  prefetch_factor: 2
