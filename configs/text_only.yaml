model_name: "multimodal-ai-text-v1"
version: "1.0.0"

text:
  vocab_size: 1000
  max_seq_len: 128
  d_model: 128
  num_heads: 4
  num_layers: 2
  dim_feedforward: 512
  dropout: 0.1

image:
  image_size: 224
  patch_size: 16
  in_channels: 3
  d_model: 128
  num_heads: 4
  num_layers: 2
  dim_feedforward: 512
  dropout: 0.1

audio:
  sample_rate: 16000
  n_fft: 400
  hop_length: 160
  n_mels: 80
  max_frames: 128
  d_model: 128
  num_heads: 4
  num_layers: 2
  dim_feedforward: 512
  dropout: 0.1

video:
  num_frames: 8
  image_size: 224
  patch_size: 16
  in_channels: 3
  d_model: 128
  num_heads: 4
  spatial_layers: 2
  temporal_layers: 1
  dim_feedforward: 512
  dropout: 0.1

music:
  vocab_size: 512
  max_seq_len: 256
  d_model: 128
  num_heads: 4
  num_layers: 2
  dim_feedforward: 512
  dropout: 0.1

fusion:
  latent_dim: 128
  num_cross_attn_layers: 1
  num_heads: 4
  dim_feedforward: 256
  dropout: 0.1
  active_modalities:
    - text

data:
  data_root: "data"
  cache_dir: ".cache"
  num_workers: 0
  pin_memory: false
  train_batch_size: 4
  eval_batch_size: 8
  max_text_length: 128
  max_audio_frames: 128
  max_video_frames: 4
  max_music_tokens: 256

training:
  num_epochs: 3
  learning_rate: 0.001
  weight_decay: 0.01
  warmup_steps: 10
  max_grad_norm: 1.0
  batch_size: 4
  gradient_accumulation_steps: 2
  mixed_precision: false
  precision: "fp32"
  log_every_n_steps: 10
  eval_every_n_epochs: 1
  save_every_n_epochs: 1
  keep_last_n_checkpoints: 2
  seed: 42
  loss_weights:
    contrastive: 1.0
    reconstruction: 0.5
    alignment: 0.3

checkpoint:
  checkpoint_dir: "checkpoints"
  log_dir: "logs"

inference:
  device: "auto"
  batch_size: 1
  text_max_tokens: 128
  text_temperature: 0.8
  text_top_k: 50
  music_max_tokens: 256
  music_temperature: 0.9
  music_top_k: 50
