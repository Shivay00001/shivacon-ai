model_name: "multimodal-ai-v1"
version: "1.0.0"

text:
  vocab_size: 8000
  max_seq_len: 256
  d_model: 256
  num_heads: 4
  num_layers: 4
  dim_feedforward: 1024
  dropout: 0.1

image:
  image_size: 224
  patch_size: 16
  in_channels: 3
  d_model: 256
  num_heads: 4
  num_layers: 4
  dim_feedforward: 1024
  dropout: 0.1

audio:
  sample_rate: 16000
  n_fft: 400
  hop_length: 160
  n_mels: 80
  max_frames: 256
  d_model: 256
  num_heads: 4
  num_layers: 2
  dim_feedforward: 512
  dropout: 0.1

video:
  num_frames: 8
  image_size: 224
  patch_size: 16
  in_channels: 3
  d_model: 256
  num_heads: 4
  spatial_layers: 2
  temporal_layers: 1
  dim_feedforward: 512
  dropout: 0.1

music:
  vocab_size: 512
  max_seq_len: 512
  d_model: 256
  num_heads: 4
  num_layers: 4
  dim_feedforward: 1024
  dropout: 0.1

fusion:
  latent_dim: 256
  num_cross_attn_layers: 2
  num_heads: 4
  dim_feedforward: 512
  dropout: 0.1
  active_modalities:
    - text
    - image
    - audio
    - video
    - music

data:
  data_root: "data"
  cache_dir: ".cache"
  num_workers: 4
  pin_memory: true
  train_batch_size: 8
  eval_batch_size: 16
  max_text_length: 256
  max_audio_frames: 256
  max_video_frames: 8
  max_music_tokens: 512

training:
  num_epochs: 10
  learning_rate: 0.0003
  weight_decay: 0.01
  warmup_steps: 500
  max_grad_norm: 1.0
  batch_size: 8
  gradient_accumulation_steps: 4
  mixed_precision: true
  precision: "bf16"
  log_every_n_steps: 50
  eval_every_n_epochs: 1
  save_every_n_epochs: 1
  keep_last_n_checkpoints: 3
  seed: 42
  loss_weights:
    contrastive: 1.0
    reconstruction: 0.5
    alignment: 0.3

checkpoint:
  checkpoint_dir: "checkpoints"
  log_dir: "logs"

inference:
  device: "auto"
  batch_size: 1
  text_max_tokens: 256
  text_temperature: 0.8
  text_top_k: 50
  music_max_tokens: 512
  music_temperature: 0.9
  music_top_k: 50
