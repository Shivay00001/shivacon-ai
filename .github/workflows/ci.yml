name: OmniCore CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch torchvision torchaudio numpy fastapi uvicorn pillow
        
    - name: Run Core Module Import Test
      run: |
        python -c "from core.multimodal_core import MultiModalCore; print('Core loaded successfully.')"
        python -c "from agent.agent_v2 import OmniCoreAgent; print('Agent loaded successfully.')"
        
    - name: Run Fine-tuning Syntax Test
      run: |
        python -c "from training.finetune import FineTuner, FineTuneConfig; print('Tuner loaded.')"
        
    - name: Run Security Syntax Test
      run: |
        python -c "from inference.engine import MultiModalInference; print('Inference loaded.')"
